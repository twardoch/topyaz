name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/topyaz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.12"
          enable-cache: true

      - name: Build distributions
        run: uv build --out-dir dist

      - name: Verify distribution files
        run: |
          ls -la dist/
          test -n "$(find dist -name '*.whl')" || { echo "Wheel file missing"; exit 1; }
          test -n "$(find dist -name '*.tar.gz')" || { echo "Source distribution missing"; exit 1; }

      # Trusted Publishing (OIDC) — configure the publisher once at
      # https://pypi.org/manage/project/topyaz/settings/publishing/
      # The `pypi` environment + id-token:write above authorize it; no API token needed.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true